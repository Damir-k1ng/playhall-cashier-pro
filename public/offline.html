<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVOY — Нет подключения</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 400px; }
    img { width: 96px; height: 96px; border-radius: 16px; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #fff; }
    p { color: #94a3b8; margin-bottom: 1.5rem; line-height: 1.6; }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:active { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.jpg" alt="SVOY" />
    <h1>Нет подключения к интернету</h1>
    <p>Проверьте соединение и попробуйте снова.</p>
    <button onclick="window.location.reload()">Обновить</button>
  </div>
</body>
</html>
